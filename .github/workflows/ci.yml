name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # ★ El round-trip ATS contra el golden file. Si el PDF re-parseado no
      #   coincide con cv-texto-plano.txt, el build falla (ESPECIFICACION §7).
      - name: ATS round-trip
        run: npm test

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22 = la LTS y el runtime de Vercel (el proyecto está en 24.x, y 22 es
          # el suelo que declara package.json). En 20 la CI probaba un runtime que
          # NADIE usa: unpdf necesita ArrayBuffer.prototype.transferToFixedLength
          # (Node ≥21) y sin él pdf.js aborta la lista de operadores en silencio.
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # ★ El round-trip ATS contra el golden file. Si el PDF re-parseado no
      #   coincide con cv-texto-plano.txt, el build falla (ESPECIFICACION §7).
      - name: ATS round-trip
        run: npm test
